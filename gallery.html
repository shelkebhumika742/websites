<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gallery</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial;
}

body{
    background:#111;
    color:white;
}

/* NAVBAR */
nav{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:15px 40px;
    background:black;
    position:sticky;
    top:0;
}

/* LOGO */
.logo{
    font-size:22px;
    font-weight:bold;
    color:white;
}

/* MENU */
.menu{
    display:flex;
    gap:20px;
}

.menu a{
    color:white;
    text-decoration:none;
    font-size:16px;
    transition:0.3s;
}

.menu a:hover{
    color:gold;
}

/* TITLE */
h1{
    text-align:center;
    margin:20px 0;
}

/* GALLERY */
.gallery{
    display:grid;
    grid-template-columns:repeat(auto-fit, minmax(250px, 1fr));
    gap:15px;
    padding:20px;
}

.gallery img{
    width:100%;
    height:250px;
    object-fit:cover;
    border-radius:10px;
    transition:0.3s;
}

.gallery img:hover{
    transform:scale(1.05);
}
</style>
</head>

<body>

<!-- NAVBAR -->
<nav>
    <div class="logo">📸 PhotoGallery</div>

    <div class="menu">
        <a href="index.html">Home</a>
        <a href="gallery.html">Gallery</a>
        <a href="services.html">Services</a>
        <a href="about.html">About</a>
        <a href="contact.html">Contact</a>
    </div>
</nav>

<h1>Gallery</h1>

<div class="gallery">
    <img src="https://images.unsplash.com/photo-1529626455594-4ff0802cfb7e">
    <img src="https://images.unsplash.com/photo-1500530855697-b586d89ba3ee">
    <img src="https://images.unsplash.com/photo-1501785888041-af3ef285b470">
    <img src="https://images.unsplash.com/photo-1519741497674-611481863552">
    <img src="https://images.unsplash.com/photo-1472214103451-9374bd1c798e">
</div>

</body>
</html>
